# .github/workflows/job_agent.yml
# Runs the job search agent every weekday morning at 8am Vancouver time (UTC-7 = 15:00 UTC)

name: Job Search Agent

on:
  schedule:
    - cron: "0 15 * * 1-5"   # Mon–Fri, 8:00 AM Vancouver time
  workflow_dispatch:           # lets you trigger it manually from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic python-dotenv

      - name: Run search agent
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python search_agent.py

      - name: Run resume tailor (top matches only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tailor.py

      - name: Send email digest
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python notify.py
